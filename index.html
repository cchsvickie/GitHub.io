<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Mills Ranch – Horse Boarding in Coupeville WA.</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Styles for the featured horse photo with clean grass overlay -->
    <style>
        .featured-horse {
            position: relative;
            max-width: 1100px;
            margin: 40px auto;
            overflow: hidden;
            border-radius: 8px;
        }
        .featured-horse img {
            width: 100%;
            display: block;
        }
        .grass-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent 50%, rgba(0,0,0,0.75));
            padding: 50px 20px 35px;
            text-align: center;
            color: white;
        }
        .grass-overlay img.monogram {
            width: 110px;           /* smaller logo */
            height: auto;
            margin-bottom: 8px;
        }
        .grass-overlay h2 {
            font-family: 'Great Vibes', cursive;
            font-size: 2.8rem;
            margin: 0 0 6px 0;
        }
        .grass-overlay h1 {
            font-size: 1.25rem;
            margin: 0;
            opacity: 0.95;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo-text">Iron Mills Ranch</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About IMR</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="staying.html">Staying at IMR</a></li>
                <li><a href="gallery.html">Photo Gallery</a></li>
                <li><a href="testimonials.html">Testimonials</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <!-- Featured horse photo with text overlaid directly on the grass -->
    <section class="featured-horse">
        <img src="ranch-horse-grazing.jpeg" alt=" ">
        <div class="grass-overlay">
            <img src="imr-logo.png" alt="Iron Mills Ranch Monogram" class="monogram">
            <h2>Iron Mills Ranch</h2>
            <h1>Horse Boarding in Coupeville WA.</h1>
        </div>
    </section>

    <footer class="footer">
        <img src="footer-logo.png" alt="Iron Mills Ranch Logo">
        <p><strong>Tel: 714-488-8550</strong> For Boarding.</p>
        <p>We are a 20 acre family run boarding facility located in Coupeville WA.</p>
    </footer>
</body>
</html>
